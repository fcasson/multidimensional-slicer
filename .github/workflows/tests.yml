name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install panel plotly pandas holoviews datashader numpy pytest
          pip install git+https://github.com/pyro-kinetics/pyrokinetics@unstable

      - name: Run tests
        env:
          SLICER_CSV: tests/fixture.csv
        run: |
          python -m pytest test_app.py test_data_utils.py test_ibm_generator.py -v
